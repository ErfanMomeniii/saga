server {
    listen 80;
    
    location / {
        proxy_pass http://saga-orchestrator:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /orders {
        proxy_pass http://order-service:8001;
        proxy_set_header Host $host;
    }
    
    location /inventory {
        proxy_pass http://inventory-service:8002;
        proxy_set_header Host $host;
    }
    
    location /payment {
        proxy_pass http://payment-service:8003;
        proxy_set_header Host $host;
    }
}